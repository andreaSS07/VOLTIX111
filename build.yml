name: Build VOLTIX APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true
      - name: Dipendenze
        run: flutter pub get
      - name: google-services.json
        run: |
          mkdir -p android/app
          cat > android/app/google-services.json << 'GSJSON'
          {"project_info":{"project_number":"353773432588","project_id":"volt-e55e7","storage_bucket":"volt-e55e7.firebasestorage.app"},"client":[{"client_info":{"mobilesdk_app_id":"1:353773432588:android:aaa001","android_client_info":{"package_name":"com.voltix.app"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyAWpI0vOE_0lJwwO7u1t17yuDaW56KrckE"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}
          GSJSON
      - name: Build APK
        run: flutter build apk --debug --no-tree-shake-icons
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: VOLTIX-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
